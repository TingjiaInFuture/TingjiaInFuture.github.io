version: 0.0.1
examples:
    - context: # 对话历史
          - role: user
            content: 扔一个漂流瓶，内容是：希望世界和平
          - role: bot
              # 触发插件
            plugin:
                # 应当触发的接口operationId
                operationId: addBottle
                # 思考过程，对触发有帮助
                thoughts: 这是一个扔漂流瓶的需求
                requestArguments:
                    message: "希望世界和平"
    - context: # 对话历史
          - role: user
            content: 捞一个漂流瓶
          - role: bot
              # 触发插件
            plugin:
                # 应当触发的接口operationId
                operationId: getBottle
                # 思考过程，对触发有帮助
                thoughts: 这是一个捞漂流瓶的需求
    # 反例，无需触发此插件的任一某个接口
    - context: # 对话历史
          - role: user
            content: 你知道漂流瓶的历史吗？
          - role: bot
              # 无需触发
            plugin:
                thoughts: 我不需要使用以上工具
